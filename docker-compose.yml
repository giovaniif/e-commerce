services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    stop_grace_period: 5s
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    stop_grace_period: 10s
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app

  kafka-connect:
    image: debezium/connect:2.7
    container_name: kafka-connect
    ports:
      - "8083:8083"
    stop_grace_period: 10s
    depends_on:
      kafka:
        condition: service_healthy
      order-db:
        condition: service_healthy
      postgres-stock:
        condition: service_healthy
      payment-db:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
    networks:
      - app

  order-db:
    image: postgres:16
    container_name: order-db
    ports:
      - "5433:5432"
    stop_grace_period: 5s
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders
    command: postgres -c wal_level=logical
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app

  payment-db:
    image: postgres:16
    container_name: payment-db
    ports:
      - "5434:5432"
    stop_grace_period: 5s
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    command: postgres -c wal_level=logical
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app

  redis-order:
    image: redis:alpine
    container_name: redis-order
    ports:
      - "6380:6379"
    stop_grace_period: 5s
    networks:
      - app

  redis-payment:
    image: redis:alpine
    container_name: redis-payment
    ports:
      - "6381:6379"
    stop_grace_period: 5s
    networks:
      - app

  redis-stock:
    image: redis:alpine
    container_name: redis-stock
    ports:
      - "6382:6379"
    stop_grace_period: 5s
    networks:
      - app

  mongo-order:
    image: mongo:7
    container_name: mongo-order
    ports:
      - "27017:27017"
    stop_grace_period: 5s
    networks:
      - app

  mongo-payment:
    image: mongo:7
    container_name: mongo-payment
    ports:
      - "27018:27017"
    stop_grace_period: 5s
    networks:
      - app

  postgres-stock:
    image: postgres:16-alpine
    container_name: postgres-stock
    ports:
      - "5432:5432"
    stop_grace_period: 5s
    command: ["postgres", "-c", "max_connections=500", "-c", "wal_level=logical"]
    environment:
      - POSTGRES_DB=stock
      - POSTGRES_USER=stock
      - POSTGRES_PASSWORD=stock
    volumes:
      - ./stock/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock -d stock"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app

  node_exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node_exporter
    ports:
      - "9100:9100"
    stop_grace_period: 5s
    networks:
      - app

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    ports:
      - "9090:9090"
    stop_grace_period: 5s
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - order
      - payment
      - stock
    networks:
      - app

  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    ports:
      - "3100:3100"
    stop_grace_period: 5s
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app

  tempo:
    image: grafana/tempo:2.3.1
    container_name: tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    stop_grace_period: 5s
    command: [ "-config.file=/etc/tempo/tempo.yml" ]
    volumes:
      - ./monitoring/tempo-config.yml:/etc/tempo/tempo.yml:ro
    networks:
      - app

  promtail:
    image: grafana/promtail:2.9.2
    container_name: promtail
    ports:
      - "9080:9080"
    stop_grace_period: 5s
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - app

  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    ports:
      - "8086:8086"
    stop_grace_period: 5s
    environment:
      - INFLUXDB_DB=k6
    networks:
      - app

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana
    ports:
      - "3000:3000"
    stop_grace_period: 5s
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3000
      - GF_DATABASE_MAX_OPEN_CONN=1
      - GF_DATABASE_MAX_IDLE_CONN=1
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/default:ro
    depends_on:
      - prometheus
      - loki
      - tempo
      - influxdb
    networks:
      - app

  stock:
    build: ./stock
    stop_grace_period: 10s
    deploy:
      replicas: 5
      resources:
        limits:
          cpus: '2.0'
          memory: 256M
    environment:
      - LOKI_URL=http://loki:3100
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - STOCK_INITIAL_QUANTITY=1000000000
      - POSTGRES_URL=postgres://stock:stock@postgres-stock:5432/stock?sslmode=disable
      - REDIS_ADDR=redis-stock:6379
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
      postgres-stock:
        condition: service_healthy
      redis-stock:
        condition: service_started
    networks:
      - app
  payment:
    build: ./payment
    stop_grace_period: 10s
    deploy:
      replicas: 5
      resources:
        limits:
          cpus: '2.0'
          memory: 256M
    environment:
      - LOKI_URL=http://loki:3100
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - REDIS_ADDR=redis-payment:6379
      - MONGO_URL=mongodb://mongo-payment:27017
    depends_on:
      - loki
      - tempo
      - redis-payment
      - mongo-payment
    networks:
      - app
  order:
    build: ./order
    stop_grace_period: 10s
    deploy:
      replicas: 8
      resources:
        limits:
          cpus: '2.0'
          memory: 256M
    environment:
      - REDIS_ADDR=redis-order:6379
      - STOCK_BASE_URL=http://stock:3133
      - PAYMENT_BASE_URL=http://payment:3132
      - LOKI_URL=http://loki:3100
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - MONGO_URL=mongodb://mongo-order:27017
    depends_on:
      - redis-order
      - mongo-order
      - stock
      - payment
      - loki
      - tempo
    networks:
      - app
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    stop_grace_period: 5s
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - stock
      - payment
      - order
    networks:
      - app

networks:
  app:
    driver: bridge
    name: payments_app

volumes:
  grafana_data:
  order_db_data:
  payment_db_data:
