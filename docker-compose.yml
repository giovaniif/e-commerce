services:
  redis-order:
    image: redis:alpine
    container_name: redis-order
    ports:
      - "6380:6379"
    stop_grace_period: 5s
    networks:
      - app

  redis-payment:
    image: redis:alpine
    container_name: redis-payment
    ports:
      - "6381:6379"
    stop_grace_period: 5s
    networks:
      - app

  redis-stock:
    image: redis:alpine
    container_name: redis-stock
    ports:
      - "6382:6379"
    stop_grace_period: 5s
    networks:
      - app

  mongo-order:
    image: mongo:7
    container_name: mongo-order
    ports:
      - "27017:27017"
    stop_grace_period: 5s
    networks:
      - app

  mongo-payment:
    image: mongo:7
    container_name: mongo-payment
    ports:
      - "27018:27017"
    stop_grace_period: 5s
    networks:
      - app

  postgres-stock:
    image: postgres:16-alpine
    container_name: postgres-stock
    ports:
      - "5432:5432"
    stop_grace_period: 5s
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_connections=500"]
    environment:
      - POSTGRES_DB=stock
      - POSTGRES_USER=stock
      - POSTGRES_PASSWORD=stock
    volumes:
      - ./stock/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock -d stock"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app

  postgres-order:
    image: postgres:16-alpine
    container_name: postgres-order
    ports:
      - "5433:5432"
    stop_grace_period: 5s
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_connections=200"]
    environment:
      - POSTGRES_DB=order
      - POSTGRES_USER=order
      - POSTGRES_PASSWORD=order
    volumes:
      - ./order/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order -d order"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app

  postgres-payment:
    image: postgres:16-alpine
    container_name: postgres-payment
    ports:
      - "5434:5432"
    stop_grace_period: 5s
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_connections=200"]
    environment:
      - POSTGRES_DB=payment
      - POSTGRES_USER=payment
      - POSTGRES_PASSWORD=payment
    volumes:
      - ./payment/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payment"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    stop_grace_period: 10s
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - app

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    ports:
      - "8085:8081"
    stop_grace_period: 5s
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app

  kafka-connect:
    image: quay.io/debezium/connect:2.7
    container_name: kafka-connect
    ports:
      - "8083:8083"
    stop_grace_period: 10s
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    depends_on:
      kafka:
        condition: service_healthy
      postgres-order:
        condition: service_healthy
      postgres-payment:
        condition: service_healthy
      postgres-stock:
        condition: service_healthy
    networks:
      - app

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8084:8080"
    stop_grace_period: 5s
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app

  node_exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node_exporter
    ports:
      - "9100:9100"
    stop_grace_period: 5s
    networks:
      - app

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    ports:
      - "9090:9090"
    stop_grace_period: 5s
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - order
      - payment
      - stock
    networks:
      - app

  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    ports:
      - "3100:3100"
    stop_grace_period: 5s
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app

  tempo:
    image: grafana/tempo:2.3.1
    container_name: tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    stop_grace_period: 5s
    command: [ "-config.file=/etc/tempo/tempo.yml" ]
    volumes:
      - ./monitoring/tempo-config.yml:/etc/tempo/tempo.yml:ro
    networks:
      - app

  promtail:
    image: grafana/promtail:2.9.2
    container_name: promtail
    ports:
      - "9080:9080"
    stop_grace_period: 5s
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - app

  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    ports:
      - "8086:8086"
    stop_grace_period: 5s
    environment:
      - INFLUXDB_DB=k6
    networks:
      - app

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana
    ports:
      - "3000:3000"
    stop_grace_period: 5s
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3000
      - GF_DATABASE_MAX_OPEN_CONN=1
      - GF_DATABASE_MAX_IDLE_CONN=1
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/default:ro
    depends_on:
      - prometheus
      - loki
      - tempo
      - influxdb
    networks:
      - app

  stock:
    build: ./stock
    stop_grace_period: 10s
    deploy:
      replicas: 5
      resources:
        limits:
          cpus: '2.0'
          memory: 256M
    environment:
      - LOKI_URL=http://loki:3100
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - STOCK_INITIAL_QUANTITY=1000000000
      - POSTGRES_URL=postgres://stock:stock@postgres-stock:5432/stock?sslmode=disable
      - REDIS_ADDR=redis-stock:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
      postgres-stock:
        condition: service_healthy
      redis-stock:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - app

  payment:
    build: ./payment
    stop_grace_period: 10s
    deploy:
      replicas: 5
      resources:
        limits:
          cpus: '2.0'
          memory: 256M
    environment:
      - LOKI_URL=http://loki:3100
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - MONGO_URL=mongodb://mongo-payment:27017
      - POSTGRES_URL=postgres://payment:payment@postgres-payment:5432/payment?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - loki
      - tempo
      - mongo-payment
      - postgres-payment
      - kafka
    networks:
      - app

  order:
    build: ./order
    stop_grace_period: 10s
    deploy:
      replicas: 8
      resources:
        limits:
          cpus: '2.0'
          memory: 256M
    environment:
      - REDIS_ADDR=redis-order:6379
      - LOKI_URL=http://loki:3100
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - MONGO_URL=mongodb://mongo-order:27017
      - POSTGRES_URL=postgres://order:order@postgres-order:5432/order?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CONSUMER_GROUP=order-consumers
    depends_on:
      - redis-order
      - mongo-order
      - loki
      - tempo
      - postgres-order
      - kafka
    networks:
      - app

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    stop_grace_period: 5s
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - stock
      - payment
      - order
    networks:
      - app

networks:
  app:
    driver: bridge
    name: payments_app

volumes:
  kafka-data:
